name: digital-twin-medicine-t2dm
version: 0.1.0
description: "Digital twin T2DM environment with tool-augmented RL/LLM agent interface."
spec_version: 1

client:
  class_name: DigitalTwinMedicineClient
  module: dtm_openenv.client

action:
  class_name: DTMAction
  module: dtm_openenv.models

observation:
  class_name: DTMObservation
  module: dtm_openenv.models

state:
  class_name: DTMState
  module: dtm_openenv.models

default_image: "digital-twin-medicine-openenv:latest"

episode:
  max_steps: 52
  step_unit: week

tools:
  - tools/ehr_analyzer.py:analyze_ehr
  - tools/genomic_profiler.py:profile_genomics
  - tools/drug_interaction_checker.py:check_drug_interactions
  - tools/disease_progression_model.py:forecast_progression
  - tools/trial_simulator.py:simulate_trial
  - tools/biomarker_tracker.py:track_biomarkers
  - tools/resistance_detector.py:detect_resistance
  - tools/risk_predictor.py:predict_risk

